<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CollabBoard — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-glow auth-glow-1"></div>
    <div class="auth-glow auth-glow-2"></div>
  </div>

  <div class="auth-card glass-panel">
    <!-- Logo -->
    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="url(#g1)"/>
        <defs>
          <linearGradient id="g1" x1="3" y1="3" x2="21" y2="21">
            <stop stop-color="#A78BFA"/>
            <stop offset="1" stop-color="#6C5CE7"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="auth-logo-text">CollabBoard</span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <!-- Error banner -->
    <div class="auth-error" id="auth-error" style="display:none"></div>

    <!-- Login form -->
    <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-username">Username</label>
        <input class="form-input" id="login-username" type="text" placeholder="Enter your username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-input" id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button class="auth-btn" type="submit" id="btn-login">
        <span id="btn-login-text">Sign In</span>
        <span id="btn-login-spinner" class="spinner" style="display:none"></span>
      </button>
    </form>

    <!-- Register form -->
    <form id="form-register" class="auth-form" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="reg-username">Username</label>
        <input class="form-input" id="reg-username" type="text" placeholder="Choose a username" autocomplete="username" required minlength="2" maxlength="32" />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input class="form-input" id="reg-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password" required minlength="6" />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-confirm">Confirm Password</label>
        <input class="form-input" id="reg-confirm" type="password" placeholder="Repeat your password" autocomplete="new-password" required minlength="6" />
      </div>
      <button class="auth-btn" type="submit" id="btn-register">
        <span id="btn-register-text">Create Account</span>
        <span id="btn-register-spinner" class="spinner" style="display:none"></span>
      </button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('cb_token')) {
      window.location.replace('/');
    }

    function showTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('auth-error').style.display = 'none';
    }

    function setLoading(btnId, loading) {
      document.getElementById(btnId + '-text').style.display = loading ? 'none' : 'inline';
      document.getElementById(btnId + '-spinner').style.display = loading ? 'inline-block' : 'none';
      document.getElementById(btnId).disabled = loading;
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      setLoading('btn-login', true);
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Login failed.'); return; }
        localStorage.setItem('cb_token', data.token);
        localStorage.setItem('cb_username', data.username);
        window.location.replace('/');
      } catch {
        showError('Network error. Please try again.');
      } finally {
        setLoading('btn-login', false);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError();
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (password !== confirm) { showError('Passwords do not match.'); return; }
      setLoading('btn-register', true);
      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Registration failed.'); return; }
        localStorage.setItem('cb_token', data.token);
        localStorage.setItem('cb_username', data.username);
        window.location.replace('/');
      } catch {
        showError('Network error. Please try again.');
      } finally {
        setLoading('btn-register', false);
      }
    }
  </script>
</body>
</html>
