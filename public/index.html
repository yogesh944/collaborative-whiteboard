<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CollabBoard — Real-Time Collaborative Whiteboard</title>
  <meta name="description" content="A real-time collaborative whiteboard for drawing, shapes, and brainstorming with live cursors and multi-user sync." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- ── Cursor Overlay ── -->
  <div id="cursors-layer"></div>

  <!-- ── Canvas ── -->
  <canvas id="main-canvas"></canvas>
  <canvas id="preview-canvas"></canvas>

  <!-- ── Toolbar ── -->
  <aside id="toolbar" class="glass-panel">
    <div class="toolbar-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="url(#g1)"/><defs><linearGradient id="g1" x1="3" y1="3" x2="21" y2="21"><stop stop-color="#A78BFA"/><stop offset="1" stop-color="#6C5CE7"/></linearGradient></defs></svg>
      <span>CollabBoard</span>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-section">
      <button class="tool-btn active" data-tool="pen" id="tool-pen" title="Pen (P)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="line" id="tool-line" title="Line (L)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
      </button>
      <button class="tool-btn" data-tool="arrow" id="tool-arrow" title="Arrow (A)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="10 5 19 5 19 14"/></svg>
      </button>
      <button class="tool-btn" data-tool="rectangle" id="tool-rectangle" title="Rectangle (R)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="ellipse" id="tool-ellipse" title="Ellipse (E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="8"/></svg>
      </button>
      <button class="tool-btn" data-tool="eraser" id="tool-eraser" title="Eraser (X)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4"/><path d="M6.5 13.5l5 5"/></svg>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-section">
      <label class="toolbar-label">Color</label>
      <div class="color-palette" id="color-palette">
        <button class="color-swatch active" data-color="#FFFFFF" style="background:#FFFFFF" title="White"></button>
        <button class="color-swatch" data-color="#A78BFA" style="background:#A78BFA" title="Purple"></button>
        <button class="color-swatch" data-color="#6C5CE7" style="background:#6C5CE7" title="Indigo"></button>
        <button class="color-swatch" data-color="#0984E3" style="background:#0984E3" title="Blue"></button>
        <button class="color-swatch" data-color="#00CEC9" style="background:#00CEC9" title="Teal"></button>
        <button class="color-swatch" data-color="#00B894" style="background:#00B894" title="Green"></button>
        <button class="color-swatch" data-color="#FDCB6E" style="background:#FDCB6E" title="Yellow"></button>
        <button class="color-swatch" data-color="#E17055" style="background:#E17055" title="Orange"></button>
        <button class="color-swatch" data-color="#E84393" style="background:#E84393" title="Pink"></button>
        <button class="color-swatch" data-color="#FF7675" style="background:#FF7675" title="Red"></button>
      </div>
      <input type="color" id="custom-color" class="custom-color-input" value="#A78BFA" title="Custom color" />
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-section">
      <label class="toolbar-label">Size</label>
      <input type="range" id="stroke-width" min="1" max="20" value="3" class="stroke-slider" />
      <span id="stroke-value" class="stroke-value">3px</span>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-section toolbar-actions">
      <button class="action-btn" id="btn-undo" title="Undo (Ctrl+Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <span>Undo</span>
      </button>
      <button class="action-btn" id="btn-redo" title="Redo (Ctrl+Y)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
        <span>Redo</span>
      </button>
      <button class="action-btn" id="btn-clear" title="Clear canvas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        <span>Clear</span>
      </button>
      <button class="action-btn accent" id="btn-export" title="Export as PNG">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export</span>
      </button>
    </div>
  </aside>

  <!-- ── Users Panel ── -->
  <div id="users-panel" class="glass-panel">
    <div class="users-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Online</span>
      <span class="user-count" id="user-count">0</span>
    </div>
    <div id="users-list" class="users-list"></div>
  </div>

  <!-- ── Toast container ── -->
  <div id="toast-container"></div>

  <!-- ── Meet Panel ── -->
  <div id="meet-panel" class="glass-panel">
    <div class="meet-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      <span>Video Call</span>
    </div>
    <div class="local-video-wrap">
      <video id="local-video" autoplay muted playsinline></video>
      <span class="video-label">You</span>
    </div>
    <div id="remote-videos" class="remote-videos"></div>
    <div id="meet-controls" class="meet-controls" style="display:none">
      <button id="btn-mute" class="meet-ctrl-btn" title="Mute">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button id="btn-camera" class="meet-ctrl-btn" title="Turn camera off">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Call & Logout Buttons (top-right area) ── -->
  <div id="top-actions">
    <button id="btn-join-call" class="action-pill" title="Join video call">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      <span>Join Call</span>
    </button>
    <button class="action-pill logout-pill" title="Logout" onclick="cbLogout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Logout</span>
    </button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js" integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb" crossorigin="anonymous"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/canvas.js"></script>
  <script src="/js/tools.js"></script>
  <script src="/js/cursors.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/export.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/meet.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
